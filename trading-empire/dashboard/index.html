<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TradeEmpire — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0c;
      --bg-panel: #111114;
      --bg-card: #16161a;
      --bg-card-hover: #1a1a1f;
      --border: #27272a;
      --border-subtle: #1f1f23;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --accent-glow: rgba(249, 115, 22, 0.15);
      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.1);
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --sidebar-w: 260px;
      --header-h: 56px;
      --dash-bar-h: 52px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ----- Header (page) ----- */
    .page-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .page-header .logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .page-header .logo span { color: var(--text-secondary); font-weight: 500; }
    .page-header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .page-header .meta { font-size: 0.8rem; color: var(--text-muted); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ----- Dashboard block (main container) ----- */
    .dashboard-wrap {
      flex: 1;
      display: flex;
      min-height: 0;
      padding: 1.25rem;
    }
    .dashboard-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ----- Dashboard top bar ----- */
    .dashboard-topbar {
      height: var(--dash-bar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .dashboard-topbar .logo-mini { font-weight: 700; color: var(--accent); font-size: 0.95rem; }
    .dashboard-topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .avatar-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ----- Sidebar ----- */
    .dashboard-body { display: flex; flex: 1; min-height: 0; }
    .sidebar {
      width: var(--sidebar-w);
      border-right: 1px solid var(--border-subtle);
      background: var(--bg-card);
      padding: 1rem 0;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0 0.75rem 1rem;
      padding: 0.65rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar-btn-new:hover { background: var(--accent-hover); }
    .nav-icon {
      width: 20px;
      height: 20px;
      opacity: 0.85;
      flex-shrink: 0;
    }
    .sidebar nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-left: 3px solid transparent;
      margin-left: 0;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .nav-sep { height: 1px; background: var(--border-subtle); margin: 0.75rem 1rem; }
    .nav-label {
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    /* ----- Main content ----- */
    main.dash-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .dash-headline {
      padding: 1.25rem 1.5rem 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .dash-content {
      flex: 1;
      padding: 0 1.5rem 1.5rem;
      overflow: auto;
    }
    .dash-content .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .dash-content .card:hover { border-color: var(--border); background: var(--bg-card-hover); }

    .meta { color: var(--text-muted); font-size: 0.875rem; }
    .cost-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .cost-table th, .cost-table td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .cost-table th { color: var(--text-secondary); font-weight: 600; }
    .cost-table .cost-value { font-weight: 600; color: var(--accent); }
    .cost-table .cost-empty { color: var(--text-muted); font-style: italic; }
    .cost-section-title { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: var(--text); }
    .cost-section-title:first-of-type { margin-top: 0; }
    .loading { color: var(--text-muted); }
    .error, .trend-down { color: var(--danger); }
    .trend-up { color: var(--success); }
    .trend-range { color: var(--text-muted); }

    /* Team grid */
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .team-grid.team-cols-1 { grid-template-columns: repeat(1, 1fr); }
    .team-grid.team-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .team-grid.team-cols-3 { grid-template-columns: repeat(3, 1fr); }
    .team-grid.team-cols-4 { grid-template-columns: repeat(4, 1fr); }
    .team-grid.team-cols-5 { grid-template-columns: repeat(5, 1fr); }
    .team-cols-picker { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .team-cols-picker span { font-size: 0.85rem; color: var(--text-muted); }
    .team-cols-picker button { padding: 0.25rem 0.6rem; font-size: 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; }
    .team-cols-picker button:hover { border-color: var(--accent); color: var(--accent); }
    .team-cols-picker button.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .team-card {
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
      background: var(--bg-card);
      transition: border-color 0.15s;
    }
    .team-card:hover { border-color: var(--border); }
    .team-card .team-card-img { display: flex; justify-content: center; margin-bottom: 0.75rem; }
    .team-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .team-card .name { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.25rem; }
    .team-card .skills { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.4; }
    .team-card .team-card-body { text-align: left; margin-top: 0.5rem; padding-top: 0.75rem; }
    .team-card-details { border-top: 1px solid var(--border-subtle); margin-top: 0.5rem; }
    .team-card-body-toggle { cursor: pointer; font-size: 0.8rem; color: var(--text-muted); padding: 0.4rem 0; list-style: none; user-select: none; }
    .team-card-body-toggle::-webkit-details-marker { display: none; }
    .team-card-body-toggle::before { content: "▸ "; }
    .team-card-details[open] .team-card-body-toggle::before { content: "▾ "; }
    .team-card-body-toggle:hover { color: var(--accent); }
    .team-card .apis-title, .team-files-title { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 0.25rem; }
    .team-skill-bars { margin-bottom: 0.75rem; }
    .team-skill-bar-row { margin-bottom: 0.5rem; }
    .team-skill-bar-label { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .team-skill-bar-track { height: 6px; background: var(--border-subtle); border-radius: 3px; overflow: hidden; }
    .team-skill-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .team-skill-bar-fill.apis-ok { background: linear-gradient(90deg, var(--accent), #7dd3a0); }
    .team-skill-bar-fill.apis-partial { background: linear-gradient(90deg, #e5a84d, #f0c674); }
    .team-skill-bar-fill.apis-low { background: linear-gradient(90deg, #c55, #e88); }
    .team-skill-score { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
    .team-skill-score.partial { color: #e5a84d; }
    .team-skill-score.low { color: #e88; }
    .team-file-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; font-size: 0.85rem; flex-wrap: wrap; }
    .team-file-row a { color: var(--accent); text-decoration: none; }
    .team-file-row a:hover { text-decoration: underline; }
    .team-file-path { font-size: 0.72rem; color: var(--text-muted); font-family: ui-monospace, monospace; word-break: break-all; }
    .team-file-content { margin-top: 0.4rem; padding: 0.6rem; background: var(--bg); border-radius: 6px; font-size: 0.78rem; white-space: pre-wrap; max-height: 180px; overflow: auto; border: 1px solid var(--border); }

    /* Wire */
    .wire-item {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem;
    }
    .wire-item:last-child { border-bottom: none; }
    .wire-item-summary { cursor: pointer; user-select: none; }
    .wire-item-summary:hover { opacity: 0.9; }
    .wire-item-detail { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-subtle); font-size: 0.85rem; }
    .wire-item-detail pre { margin: 0.5rem 0; padding: 0.75rem; background: var(--bg); border-radius: 6px; overflow: auto; max-height: 320px; white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; border: 1px solid var(--border); }
    .wire-load-ref { margin-top: 0.5rem; }
    .wire-load-ref button { padding: 0.35rem 0.75rem; font-size: 0.8rem; cursor: pointer; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); }
    .wire-load-ref button:hover { background: var(--bg-card-hover); }
    .intel-card { margin-bottom: 1.25rem; }
    .intel-card .intel-card-head { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1rem; margin-bottom: 0.75rem; }
    .intel-card .intel-card-title { font-weight: 700; font-size: 1.05rem; margin: 0; }
    .intel-badge { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; }
    .intel-badge.source-x { background: var(--accent-dim); color: var(--accent); }
    .intel-badge.source-youtube { background: rgba(255,0,0,0.15); color: #f44; }
    .intel-badge.indispensable { background: rgba(0,200,100,0.2); color: #0c8; }
    .intel-badge.borderline { background: rgba(255,180,0,0.2); color: #fa0; }
    .intel-badge.rejeté { background: rgba(255,80,80,0.2); color: #f55; }
    .intel-card .intel-card-summary { font-size: 0.95rem; line-height: 1.5; color: var(--text-secondary); white-space: pre-wrap; margin: 0.5rem 0; }
    .intel-scan-status { margin-bottom: 1.25rem; }
    .intel-scan-status .status-row { display: flex; align-items: flex-start; gap: 0.5rem; margin: 0.35rem 0; font-size: 0.9rem; }
    .intel-scan-status .status-ok { color: var(--trend-up); }
    .intel-scan-status .status-error { color: var(--trend-down); }
    .empty-state { padding: 2.5rem; text-align: center; color: var(--text-muted); font-size: 0.95rem; }
    .boss-validation-help { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-secondary); }
    .boss-proposal-card { position: relative; }
    .boss-proposal-header { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
    .boss-badge-validated { color: var(--accent); font-size: 0.85rem; }
    .btn-validate-boss { padding: 0.25rem 0.6rem; font-size: 0.8rem; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); cursor: pointer; margin-left: auto; }
    .btn-validate-boss:hover { opacity: 0.9; }
    .boss-proposal-validated { opacity: 0.85; border-left: 3px solid var(--accent); }
    .legend-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-secondary); }
    .legend-box strong { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .idea-card { margin-bottom: 1rem; }
    .idea-card .idea-head { font-weight: 700; margin-bottom: 0.5rem; }
    .idea-card .idea-desc { font-size: 0.9rem; line-height: 1.5; color: var(--text-secondary); margin: 0.75rem 0; padding-left: 0.5rem; border-left: 3px solid var(--border); }
    .idea-card .idea-meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }
    .signal-row {
      display: grid;
      grid-template-columns: 1fr 80px 100px 1fr 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem;
    }
    .signal-row:last-child { border-bottom: none; }

    /* Mobile */
    .hamburger {
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .hamburger:hover { background: rgba(255,255,255,0.06); }
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sidebar-backdrop.visible { display: block; opacity: 1; }
    @media (max-width: 900px) {
      .sidebar { position: fixed; left: 0; top: var(--header-h); bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.2s; box-shadow: 4px 0 24px rgba(0,0,0,0.3); }
      .sidebar.open { transform: translateX(0); }
      .page-header .hamburger { display: flex !important; }
      .sidebar-backdrop.visible { display: block; opacity: 1; }
      .dashboard-wrap { padding: 0.75rem; }
      .dash-headline { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <button type="button" class="hamburger" id="hamburger" aria-label="Menu" style="display:none;">☰</button>
    <span class="logo">Trade<span>Empire</span></span>
    <div class="page-header-actions">
      <span class="meta" id="dashboardUrl" title="Adresse du dashboard">—</span>
      <button type="button" class="btn btn-primary" id="btnBrief">Brief du jour</button>
    </div>
  </header>

  <div class="dashboard-wrap">
    <div class="dashboard-block">
      <div class="dashboard-topbar">
        <span class="logo-mini">Dashboard</span>
        <div class="dashboard-topbar-actions">
          <div class="avatar-placeholder" title="Profil">OP</div>
        </div>
      </div>

      <div class="dashboard-body">
        <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>
        <aside class="sidebar" id="sidebar">
          <button type="button" class="sidebar-btn-new" id="btnNewTask">+ Nouvelle tâche</button>
          <nav>
            <span class="nav-label">Navigation</span>
            <a href="#" data-view="timeline">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              TimeLine
            </a>
            <a href="#" class="active" data-view="team">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Team
            </a>
            <a href="#" data-view="wire">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Wire
            </a>
            <span class="nav-sep"></span>
            <span class="nav-label">Modules</span>
            <a href="#" data-view="niches">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
              Niches
            </a>
            <a href="#" data-view="intel">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              OpenClaw Intel
            </a>
            <a href="#" data-view="cost">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Cost
            </a>
            <a href="#" data-view="execution">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Exécution
            </a>
            <a href="#" data-view="tibo_reports">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
              Rapports Tibo
            </a>
            <a href="#" data-view="api_requests">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H17.22a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 0-2.83l.06-.06z"/></svg>
              Besoins API
            </a>
            <a href="#" data-view="boss_proposals">Propositions BOSS</a>
            <span class="nav-sep"></span>
            <span class="nav-label">Données</span>
            <a href="#" data-view="agent_status">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Rapport agents
            </a>
            <a href="#" data-view="technicals">Signaux techniques</a>
            <a href="#" data-view="smart_money">Smart money</a>
            <a href="#" data-view="sentiment">Sentiment</a>
            <a href="#" data-view="ideas">Idées</a>
            <a href="#" data-view="decisions">Décisions</a>
            <a href="#" data-view="journal">Journal</a>
            <a href="#" data-view="chase">Chase (Tracker)</a>
          </nav>
        </aside>

        <main class="dash-main">
          <h1 class="dash-headline" id="viewTitle">TimeLine</h1>
          <div id="content" class="dash-content"><div class="card"><p class="loading">Chargement…</p></div></div>
        </main>
      </div>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const viewTitle = document.getElementById('viewTitle');
    const sidebar = document.getElementById('sidebar');

    const TITLES = {
      team: 'Team',
      timeline: 'TimeLine',
      wire: 'Wire (échanges entre agents)',
      niches: 'Niches',
      intel: 'OpenClaw Intel',
      cost: 'Cost',
      execution: 'Exécution — Mode réel',
      tibo_reports: 'Rapports Tibo — Exécution & TP',
      api_requests: 'Besoins API',
      boss_proposals: 'Propositions BOSS (validation humaine)',
      technicals: 'Signaux techniques',
      smart_money: 'Smart money',
      sentiment: 'Sentiment',
      ideas: 'Idées',
      decisions: 'Décisions',
      journal: 'Journal',
      chase: 'Chase (Tracker) — Post-mortem et feedback',
      agent_status: 'Rapport de situation — Agents'
    };

    let agentDisplayNames = {};
    async function ensureAgentDisplayNames() {
      if (Object.keys(agentDisplayNames).length) return;
      const team = await fetchJson('/api/team');
      if (team && team.length) team.forEach((a) => { agentDisplayNames[a.id.toUpperCase()] = a.name; });
    }
    function agentName(key) { return agentDisplayNames[key] || key; }

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) return null;
      return r.json();
    }

    function teamIdToReportKey(id) {
      return String(id).toUpperCase();
    }
    function computeSkillScores(reportEntry) {
      if (!reportEntry) return { apiPct: 0, compPct: 0, overall: 0, apiOk: 0, apiTotal: 0, compOk: 0, compTotal: 0 };
      const apis = reportEntry.api_connections || [];
      const comps = reportEntry.competencies || [];
      const apiTotal = apis.length;
      const apiOk = apis.filter((x) => x.status === 'ok').length;
      const compTotal = comps.length;
      const compOk = comps.filter((c) => c.status === 'ok').length;
      const compSkip = comps.filter((c) => c.status === 'skip').length;
      const apiPct = apiTotal ? Math.round((apiOk / apiTotal) * 100) : 100;
      const compPct = compTotal ? Math.round(((compOk + compSkip * 0.5) / compTotal) * 100) : 100;
      const overall = Math.round((apiPct + compPct) / 2);
      return { apiPct, compPct, overall, apiOk, apiTotal, compOk, compTotal };
    }
    async function viewTeam() {
      const [team, report] = await Promise.all([fetchJson('/api/team'), fetchJson('/api/agent_status_report').catch(() => null)]);
      if (!team || !team.length) {
        content.innerHTML = '<p class="empty-state">Aucune config team (dashboard/config/team.json).</p>';
        return;
      }
      const reportAgents = (report && report.agents) ? report.agents : {};
      const savedCols = (typeof localStorage !== 'undefined' && localStorage.getItem('tradeempire_team_cards_per_row')) || 'auto';
      const colsOptions = [1, 2, 3, 4, 5];
      let html = '<p class="meta" style="margin-bottom:1rem;">Barres de progression : maîtrise des APIs et compétences (données du rapport agents). Vert = bon, orange = partiel, rouge = à améliorer. <a href="#" onclick="load(\'agent_status\'); return false;">Voir le rapport détaillé</a></p>';
      html += '<div class="team-cols-picker"><span>Cartes par ligne :</span>';
      for (const n of colsOptions) {
        const isActive = savedCols === String(n);
        html += '<button type="button" class="team-cols-btn' + (isActive ? ' active' : '') + '" data-cols="' + n + '">' + n + '</button>';
      }
      html += '<button type="button" class="team-cols-btn' + (savedCols === 'auto' ? ' active' : '') + '" data-cols="auto">Auto</button></div>';
      html += '<div class="team-grid' + (savedCols !== 'auto' ? ' team-cols-' + savedCols : '') + '">';
      for (const a of team) {
        const reportKey = teamIdToReportKey(a.id);
        const reportEntry = reportAgents[reportKey];
        const scores = computeSkillScores(reportEntry);
        const photoUrl = (window.location.origin || '') + '/api/agent-photo/' + encodeURIComponent(a.id);
        const apis = (a.apis_used && a.apis_used.length) ? a.apis_used.join(' ; ') : '—';
        const files = await fetchJson('/api/agent-files/' + encodeURIComponent(a.id)) || [];
        const basePath = 'agents/' + a.id + '/';
        const apiClass = scores.apiPct >= 80 ? 'apis-ok' : (scores.apiPct >= 40 ? 'apis-partial' : 'apis-low');
        const scoreClass = scores.overall >= 80 ? '' : (scores.overall >= 40 ? 'partial' : 'low');
        html += '<div class="team-card" data-agent-id="' + a.id + '">';
        html += '<div class="team-card-img"><img src="' + photoUrl + '" alt="' + (a.name || a.id) + '" loading="lazy" decoding="async" onerror="this.style.display=\'none\'"></div>';
        html += '<div class="name">' + a.name + '</div>';
        html += '<div class="skills">' + (a.skills || '—') + '</div>';
        if (reportEntry) {
          html += '<div class="team-skill-bars">';
          html += '<div class="team-skill-bar-row"><div class="team-skill-bar-label"><span>APIs</span><span class="team-skill-score ' + scoreClass + '">' + scores.apiOk + '/' + scores.apiTotal + ' · ' + scores.apiPct + '%</span></div><div class="team-skill-bar-track"><div class="team-skill-bar-fill ' + apiClass + '" style="width:' + scores.apiPct + '%"></div></div></div>';
          var compNames = (reportEntry.competencies || []).map(function(c) { return c.name; }).join(', ') || '—';
          html += '<div class="team-skill-bar-row"><div class="team-skill-bar-label"><span>Compétences</span><span class="team-skill-score ' + scoreClass + '">' + scores.compOk + '/' + scores.compTotal + ' · ' + scores.compPct + '%</span></div><div class="team-skill-bar-track"><div class="team-skill-bar-fill ' + (scores.compPct >= 80 ? 'apis-ok' : (scores.compPct >= 40 ? 'apis-partial' : 'apis-low')) + '" style="width:' + scores.compPct + '%"></div></div><div class="meta" style="font-size:0.7rem; margin-top:0.15rem;">' + compNames.replace(/</g, '&lt;') + '</div></div>';
          html += '<div class="team-skill-bar-label" style="margin-top:0.35rem;"><span>Niveau global</span><span class="team-skill-score ' + scoreClass + '">' + scores.overall + '%</span></div><div class="team-skill-bar-track"><div class="team-skill-bar-fill ' + (scores.overall >= 80 ? 'apis-ok' : (scores.overall >= 40 ? 'apis-partial' : 'apis-low')) + '" style="width:' + scores.overall + '%"></div></div>';
          html += '</div>';
        } else {
          html += '<div class="team-skill-bars"><div class="team-skill-bar-label"><span class="meta">Exécuter le rapport agents pour afficher les barres</span></div></div>';
        }
        html += '<details class="team-card-details"><summary class="team-card-body-toggle">APIs &amp; Fichiers</summary>';
        html += '<div class="team-card-body">';
        html += '<div class="apis"><span class="apis-title">APIs utilisées</span><div>' + apis + '</div></div>';
        html += '<div class="team-files"><span class="team-files-title">Fichiers (voir / éditer)</span>';
        files.forEach((f) => {
          html += '<div class="team-file-row"><a href="#" class="team-file-view" data-agent="' + a.id + '" data-file="' + f + '">Voir</a> <span class="team-file-path">' + basePath + f + '</span></div>';
          html += '<div class="team-file-content" id="team-file-' + a.id + '-' + f.replace(/\./g,'-') + '" style="display:none;"></div>';
        });
        if (!files.length) html += '<div class="team-file-path">Aucun .md dans agents/' + a.id + '/</div>';
        html += '</div></div></details></div>';
      }
      html += '</div>';
      content.innerHTML = html;
      const gridEl = content.querySelector('.team-grid');
      content.querySelectorAll('.team-cols-btn').forEach((btn) => {
        btn.addEventListener('click', function() {
          const cols = this.getAttribute('data-cols');
          if (typeof localStorage !== 'undefined') localStorage.setItem('tradeempire_team_cards_per_row', cols);
          content.querySelectorAll('.team-cols-btn').forEach((b) => b.classList.remove('active'));
          this.classList.add('active');
          gridEl.classList.remove('team-cols-1', 'team-cols-2', 'team-cols-3', 'team-cols-4', 'team-cols-5');
          if (cols !== 'auto') gridEl.classList.add('team-cols-' + cols);
        });
      });
      content.querySelectorAll('.team-file-view').forEach((el) => {
        el.addEventListener('click', async (e) => {
          e.preventDefault();
          const agentId = el.dataset.agent;
          const file = el.dataset.file;
          const id = 'team-file-' + agentId + '-' + file.replace(/\./g,'-');
          const block = document.getElementById(id);
          if (!block) return;
          if (block.style.display === 'block') { block.style.display = 'none'; return; }
          const r = await fetch('/api/agent-file/' + encodeURIComponent(agentId) + '/' + encodeURIComponent(file));
          block.textContent = r.ok ? await r.text() : 'Non trouvé';
          block.style.display = 'block';
        });
      });
    }

    async function postJson(url, body) {
      const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return r.ok ? r.json() : null;
    }
    async function patchJson(url, body) {
      const r = await fetch(url, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return r.ok ? r.json() : null;
    }
    async function deleteJson(url) {
      const r = await fetch(url, { method: 'DELETE' });
      return r.ok ? r.json() : null;
    }
    async function viewTimeline() {
      const data = await fetchJson('/api/kanban');
      const cols = (data && data.columns) || [];
      const tasks = (data && data.tasks) || [];
      let html = '<p class="meta">Board des tâches (amélioration continue). Données : data/dashboard/kanban.json</p>';
      html += '<div class="card kanban-form"><strong>Nouvelle tâche</strong> ';
      html += '<input type="text" id="kanbanNewTitle" placeholder="Titre" style="margin:0 0.5rem; padding:0.4rem 0.6rem; border-radius:6px; border:1px solid var(--border); min-width:200px;"> ';
      html += '<select id="kanbanNewCol" style="padding:0.4rem; border-radius:6px; border:1px solid var(--border);">';
      cols.forEach((c) => { html += '<option value="' + c.id + '">' + (c.title || c.id) + '</option>'; });
      html += '</select> <button type="button" class="btn btn-primary" id="kanbanAddBtn" style="margin-left:0.5rem;">Ajouter</button></div>';
      html += '<div class="kanban-board" style="display:grid; grid-template-columns: repeat(' + cols.length + ', 1fr); gap:1rem; margin-top:1rem;">';
      cols.forEach((col) => {
        const colTasks = tasks.filter((t) => t.columnId === col.id);
        html += '<div class="card" style="min-height:120px;"><div class="idea-head" style="margin-bottom:0.5rem;">' + (col.title || col.id) + '</div>';
        colTasks.forEach((t) => {
          html += '<div class="kanban-task" data-task-id="' + t.id + '" style="padding:0.5rem; margin-bottom:0.4rem; background:var(--bg); border-radius:6px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">';
          html += '<span style="flex:1; min-width:0;">' + (t.title || '—').replace(/</g, '&lt;') + (t.source === 'boss_proposal' ? ' <span class="meta" style="font-size:0.75rem;">(proposition BOSS)</span>' : '') + (t.description ? '<br><span class="meta" style="font-size:0.8rem;">' + (t.description || '').replace(/</g, '&lt;').slice(0, 120) + ((t.description || '').length > 120 ? '…' : '') + '</span>' : '') + '</span>';
          html += '<span><select class="kanban-task-col" data-id="' + t.id + '" style="font-size:0.8rem; padding:0.2rem;">';
          cols.forEach((c) => { html += '<option value="' + c.id + '"' + (c.id === t.columnId ? ' selected' : '') + '>' + (c.title || c.id) + '</option>'; });
          html += '</select> <button type="button" class="kanban-task-del btn btn-ghost" data-id="' + t.id + '" style="padding:0.2rem 0.4rem; font-size:0.8rem;">Suppr.</button></span></div>';
        });
        html += '</div>';
      });
      html += '</div>';
      content.innerHTML = html;
      document.getElementById('kanbanAddBtn').onclick = async () => {
        const title = document.getElementById('kanbanNewTitle').value.trim() || 'Sans titre';
        const columnId = document.getElementById('kanbanNewCol').value;
        const updated = await postJson('/api/kanban/task', { title, columnId });
        if (updated) { document.getElementById('kanbanNewTitle').value = ''; viewTimeline(); }
      };
      content.querySelectorAll('.kanban-task-col').forEach((sel) => {
        sel.onchange = async () => {
          const id = sel.dataset.id;
          const updated = await patchJson('/api/kanban/task/' + id, { columnId: sel.value });
          if (updated) viewTimeline();
        };
      });
      content.querySelectorAll('.kanban-task-del').forEach((btn) => {
        btn.onclick = async () => {
          if (!confirm('Supprimer cette tâche ?')) return;
          const id = btn.dataset.id;
          const updated = await deleteJson('/api/kanban/task/' + id);
          if (updated) viewTimeline();
        };
      });
    }

    async function viewWire() {
      const list = await fetchJson('/api/wire');
      if (!list || !list.length) {
        content.innerHTML = '<p class="empty-state">Aucun échange enregistré. Lancez run-morning.js pour alimenter le Wire.</p>';
        return;
      }
      await ensureAgentDisplayNames();
      const sorted = [...list].sort((a, b) => (b.timestamp_utc || '').localeCompare(a.timestamp_utc || ''));
      let html = '<p class="meta" style="margin-bottom:0.75rem;">Cliquez sur un échange pour afficher le détail complet et le contenu référencé.</p><div class="card" style="padding:0;">';
      sorted.forEach((e, idx) => {
        const ctx = e.context && Object.keys(e.context).length ? ' <span class="meta">' + JSON.stringify(e.context) + '</span>' : '';
        const ref = e.content_ref ? ` <span class="meta">→ ${e.content_ref}</span>` : '';
        const from = agentName(e.from_agent);
        const to = agentName(e.to_agent);
        const ts = e.timestamp_utc ? new Date(e.timestamp_utc).toLocaleString('fr-FR') : '';
        const detailId = 'wire-detail-' + idx;
        const fullJson = JSON.stringify({ id: e.id, from_agent: e.from_agent, to_agent: e.to_agent, type: e.type, context: e.context || {}, content_summary: e.content_summary, content_ref: e.content_ref || null, timestamp_utc: e.timestamp_utc }, null, 2);
        html += '<div class="wire-item" data-wire-idx="' + idx + '">';
        html += '<div class="wire-item-summary" data-detail-id="' + detailId + '" data-content-ref="' + (e.content_ref ? String(e.content_ref).replace(/"/g, '&quot;') : '') + '">';
        html += '<strong>' + from + '</strong> → ' + to + ' <span class="meta">(' + e.type + ')</span> — ' + (e.content_summary || '') + ctx + ref + ' <span class="meta">' + ts + '</span>';
        html += '</div>';
        html += '<div id="' + detailId + '" class="wire-item-detail" style="display:none;">';
        html += '<div class="meta" style="margin-bottom:0.35rem;">Échange complet</div>';
        html += '<pre>' + fullJson.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
        if (e.content_ref) {
          html += '<div class="wire-load-ref"><button type="button" class="wire-btn-load-ref" data-ref="' + String(e.content_ref).replace(/"/g, '&quot;') + '" data-detail-id="' + detailId + '">Charger le contenu : ' + String(e.content_ref).replace(/</g, '&lt;') + '</button><pre class="wire-ref-content" id="' + detailId + '-content" style="display:none; margin-top:0.5rem;"></pre></div>';
        }
        html += '</div></div>';
      });
      html += '</div>';
      content.innerHTML = html;
      content.querySelectorAll('.wire-item-summary').forEach((el) => {
        el.addEventListener('click', () => {
          const detailId = el.getAttribute('data-detail-id');
          const block = document.getElementById(detailId);
          if (!block) return;
          block.style.display = block.style.display === 'none' ? 'block' : 'none';
        });
      });
      content.querySelectorAll('.wire-btn-load-ref').forEach((btn) => {
        btn.addEventListener('click', async function() {
          const ref = this.getAttribute('data-ref');
          const detailId = this.getAttribute('data-detail-id');
          const contentBlock = document.getElementById(detailId + '-content');
          if (!ref || !contentBlock) return;
          if (contentBlock.textContent) {
            const show = contentBlock.style.display === 'none';
            contentBlock.style.display = show ? 'block' : 'none';
            this.textContent = show ? 'Masquer le contenu' : ('Charger le contenu : ' + ref);
            return;
          }
          try {
            const r = await fetch('/api/wire-content?path=' + encodeURIComponent(ref));
            const data = r.ok ? await r.json() : null;
            const raw = data && data.content != null ? data.content : (r.ok ? '' : 'Erreur ' + r.status);
            contentBlock.textContent = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
            contentBlock.style.display = 'block';
            this.textContent = 'Masquer le contenu';
          } catch (err) {
            contentBlock.textContent = 'Erreur : ' + (err.message || err);
            contentBlock.style.display = 'block';
          }
        });
      });
    }

    async function viewNiches() {
      const [ideas, fiches] = await Promise.all([fetchJson('/api/ideas'), fetchJson('/api/niches')]);
      let html = '<p class="meta">Fiches Niches scorées (build-niches-fiches.js) + idées du jour. Matrice : macro, trend, structure, volume, funding, sentiment, R:R, score.</p>' + ideaLegend();
      if (fiches && fiches.length) {
        html += '<div class="card"><strong>Fiches scorées</strong> (' + fiches.length + ')</div>';
        fiches.slice(0, 15).forEach((f) => {
          const sc = f.scores || {};
          const rr = f.targets && f.targets[0] ? f.targets[0].rr : (sc.rr != null ? sc.rr : '—');
          const conf = sc.confidence != null ? (sc.confidence * 100).toFixed(0) + '%' : '—';
          html += '<div class="card idea-card"><div class="idea-head">' + (f.trade_id || f.symbol) + ' — ' + (f.symbol || '') + ' ' + (f.direction || '') + ' | entry ' + (f.entry ?? '—') + ' | invalid ' + (f.invalid ?? '—') + ' | R:R ' + rr + ' | confidence ' + conf + ' | Score ' + (f.score_global ?? '—') + '/100</div>';
          if (f.intel) {
            const alignLabel = f.intel.aligns_with_narrative === true ? 'Aligné Intel' : (f.intel.aligns_with_narrative === false ? 'Décalé Intel' : 'Intel');
            const alignClass = f.intel.aligns_with_narrative === true ? 'trend-up' : (f.intel.aligns_with_narrative === false ? 'trend-down' : '');
            html += '<div class="meta">Intel (Daphnée) : <span class="' + alignClass + '">' + alignLabel + '</span> — thèmes : ' + (f.intel.themes && f.intel.themes.length ? f.intel.themes.join(', ') : '—') + '</div>';
          }
          if (f.description) html += '<div class="idea-desc">' + (f.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
          html += '<div class="idea-meta">trend ' + (sc.macro_trend ? '1' : '0') + ' | structure ' + (sc.structure_htf ? '1' : '0') + ' | funding ' + (sc.funding ? '1' : '0') + ' | sentiment ' + (sc.sentiment ? '1' : '0') + '</div>';
          html += '<div class="meta">' + (f.timestamp_utc ? new Date(f.timestamp_utc).toLocaleString('fr-FR') : '') + '</div></div>';
        });
        if (fiches.length > 15) html += '<p class="meta">… et ' + (fiches.length - 15) + ' autres fiches.</p>';
      }
      if (ideas && ideas.length) {
        html += '<div class="card" style="margin-top:1rem;"><strong>Idées du jour</strong></div>';
        ideas.forEach((i) => { html += renderIdeaCard(i); });
      } else if (!fiches || !fiches.length) {
        html += '<p class="empty-state">Aucune idée ni fiche. Lancez run-morning.js puis build-niches-fiches.js.</p>';
      }
      content.innerHTML = html;
    }

    async function viewIntel() {
      let data;
      try {
        data = await fetchJson('/api/intel');
      } catch (e) {
        content.innerHTML = '<p class="empty-state">Erreur chargement Intel (vérifier que le serveur dashboard tourne et /api/intel répond).</p>';
        return;
      }
      if (!data) data = {};
      const trendCards = (data.trend_cards && typeof data.trend_cards === 'object') ? data.trend_cards : { date: null, timestamp_utc: null, cards: [] };
      const cardsFromTrend = Array.isArray(trendCards.cards) ? trendCards.cards : [];
      const itemsFromApi = Array.isArray(data.items) ? data.items : [];
      const cards = cardsFromTrend.length ? cardsFromTrend : itemsFromApi;
      const scanStatus = (data.scan_status && typeof data.scan_status === 'object') ? data.scan_status : null;
      const lastUpdate = trendCards.date || trendCards.timestamp_utc || (data.trend_cards_date || '');

      let html = '<h2 style="margin-top:0; font-size:1.1rem;">OpenClaw Intel (Daphnée)</h2>';
      html += '<p class="meta">Trend Cards X + YouTube. Classement : indispensable / borderline / rejeté. Dernière mise à jour des cartes : ' + (lastUpdate || '—') + '.</p>';

      if (scanStatus) {
        html += '<div class="card intel-scan-status"><h3 style="margin-top:0; font-size:1rem;">Statut du scraping</h3>';
        html += '<div class="meta">Dernière exécution : ' + (scanStatus.last_run_utc ? new Date(scanStatus.last_run_utc).toLocaleString('fr-FR') : '—') + '</div>';
        if (scanStatus.x) {
          const xOk = scanStatus.x.status === 'ok';
          const xUnknown = scanStatus.x.status === 'unknown';
          const xLabel = xOk ? 'OK' : (xUnknown ? 'Non enregistré' : (scanStatus.x.message || 'Erreur'));
          html += '<div class="status-row"><strong>X (Twitter)</strong> : <span class="' + (xOk ? 'status-ok' : (xUnknown ? '' : 'status-error')) + '">' + xLabel.replace(/</g, '&lt;') + '</span></div>';
        }
        if (scanStatus.youtube) {
          const y = scanStatus.youtube;
          const yLabel = y.status === 'ok' ? 'OK' : (y.status === 'partial' ? 'Partiel' : (y.status === 'unknown' ? 'Non enregistré' : 'Erreur'));
          html += '<div class="status-row"><strong>YouTube</strong> : <span class="' + (y.status === 'ok' ? 'status-ok' : (y.status === 'unknown' ? '' : 'status-error')) + '">' + yLabel + '</span>';
          if (y.count_ok != null || y.count_fail != null) html += ' (' + (y.count_ok || 0) + ' ok, ' + (y.count_fail || 0) + ' échec)';
          html += '</div>';
          if (y.errors && y.errors.length) {
            html += '<div class="meta" style="margin-top:0.5rem; margin-left:1rem;">';
            y.errors.forEach(function(e) {
              html += '<div>' + (e.url ? e.url.replace(/</g, '&lt;') : '') + ' — <span class="status-error">' + (e.error || '').replace(/</g, '&lt;') + '</span></div>';
            });
            html += '</div>';
          }
        }
        html += '</div>';
      } else {
        html += '<div class="card intel-scan-status"><p class="meta">Aucun statut de scraping (exécuter <code>node scripts/intel-scan.js</code> pour générer intel_scan_status.json).</p></div>';
      }

      if (!cards.length) {

    }
    async function viewIdeas() {
      const list = await fetchJson('/api/ideas');
      if (!list || !list.length) { content.innerHTML = '<p class="empty-state">Aucune idée.</p>'; return; }
      content.innerHTML = ideaLegend() + list.map((i) => renderIdeaCard(i)).join('');
    }
    async function viewDecisions() {
      const list = await fetchJson('/api/decisions');
      if (!list || !list.length) { content.innerHTML = '<p class="empty-state">Aucune décision.</p>'; return; }
      content.innerHTML = list.map((d) => `<div class="card"><strong>${d.trade_id}</strong> — ${d.status} | ${d.reason || ''} <span class="meta">${d.timestamp_utc ? new Date(d.timestamp_utc).toLocaleString('fr-FR') : ''}</span></div>`).join('');
    }
    async function viewJournal() {
      const date = new Date().toISOString().slice(0, 10);
      const r = await fetch('/api/journal/' + date);
      if (r.status === 404) { content.innerHTML = '<p class="empty-state">Aucun journal pour ce jour.</p>'; return; }
      const text = await r.text();
      content.innerHTML = '<pre style="white-space:pre-wrap; margin:0; font-size:0.9rem;">' + text.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
    }
    async function viewChase() {
      const [feedback, postMortems] = await Promise.all([fetchJson('/api/chase_feedback'), fetchJson('/api/chase_post_mortems')]);
      let html = '<p class="meta">Chase (Tracker) : suit les idées APPROVED, post-mortem (bonne/mauvaise) et feedback vers les agents. Remplir data/tracker/outcomes/{trade_id}.json avec outcome (win|loss|invalid_hit|target_hit) puis lancer <code>node scripts/chase-tracker.js</code>.</p>';
      if (feedback && (feedback.post_mortem_count > 0 || Object.keys(feedback.by_agent || {}).length)) {
        html += '<div class="card"><strong>Feedback par agent</strong> (dernier run Chase)</div>';
        for (const [agent, text] of Object.entries(feedback.by_agent || {})) {
          html += '<div class="card idea-card"><div class="idea-head">' + agent + '</div><div class="idea-meta">' + (text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div></div>';
        }
      }
      if (postMortems && postMortems.length) {
        html += '<div class="card" style="margin-top:1rem;"><strong>Post-mortems</strong> (' + postMortems.length + ')</div>';
        postMortems.slice(0, 20).forEach((p) => {
          html += '<div class="card"><a href="#" class="chase-pm-link" data-id="' + p.id + '">' + p.id + '</a></div>';
        });
      }
      if ((!feedback || feedback.post_mortem_count === 0) && (!postMortems || !postMortems.length)) {
        html += '<p class="empty-state">Aucun post-mortem ni feedback. Approuvez des idées (RISK_JOURNAL), remplissez data/tracker/outcomes/{trade_id}.json (outcome: win|loss|invalid_hit|target_hit), puis exécutez chase-tracker.js.</p>';
      }
      content.innerHTML = html;
      content.querySelectorAll('.chase-pm-link').forEach((a) => {
        a.onclick = async (e) => {
          e.preventDefault();
          const r = await fetch('/api/chase_post_mortem/' + a.dataset.id);
          const text = await r.text();
          content.innerHTML = '<pre style="white-space:pre-wrap;">' + text.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre><button type="button" class="btn btn-ghost chase-back">Retour Chase</button>';
          content.querySelector('.chase-back').onclick = () => viewChase();
        };
      });
    }

    const VIEW_LOADERS = {
      team: viewTeam,
      timeline: viewTimeline,
      wire: viewWire,
      niches: viewNiches,
      intel: viewIntel,
      cost: viewCost,
      execution: viewExecution,
      tibo_reports: viewTiboReports,
      api_requests: viewApiRequests,
      boss_proposals: viewBossProposals,
      agent_status: viewAgentStatus,
      technicals: viewTechnicals,
      smart_money: viewSmartMoney,
      sentiment: viewSentiment,
      ideas: viewIdeas,
      decisions: viewDecisions,
      journal: viewJournal,
      chase: viewChase
    };

    async function load(view) {
      const title = TITLES[view] || view;
      viewTitle.textContent = title;
      content.innerHTML = '<div class="card"><p class="loading">Chargement…</p></div>';
      const fn = VIEW_LOADERS[view];
      if (fn) await fn();
      else content.innerHTML = '<p class="empty-state">Vue non implémentée.</p>';
    }

    document.querySelectorAll('.sidebar a[data-view]').forEach((a) => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const view = a.dataset.view;
        document.querySelectorAll('.sidebar a[data-view]').forEach((x) => x.classList.remove('active'));
        a.classList.add('active');
        load(view);
        sidebar.classList.remove('open');
        document.getElementById('sidebarBackdrop').classList.remove('visible');
      });
    });

    document.getElementById('hamburger').addEventListener('click', () => {
      sidebar.classList.toggle('open');
      document.getElementById('sidebarBackdrop').classList.toggle('visible', sidebar.classList.contains('open'));
    });
    document.getElementById('sidebarBackdrop').addEventListener('click', () => {
      sidebar.classList.remove('open');
      document.getElementById('sidebarBackdrop').classList.remove('visible');
    });
    document.getElementById('btnBrief').addEventListener('click', () => { load('journal'); document.querySelector('.sidebar a[data-view="journal"]') && document.querySelectorAll('.sidebar a[data-view]').forEach((x) => { x.classList.remove('active'); if (x.dataset.view === 'journal') x.classList.add('active'); }); });
    document.getElementById('btnNewTask').addEventListener('click', () => { load('timeline'); document.querySelectorAll('.sidebar a[data-view]').forEach((x) => { x.classList.remove('active'); if (x.dataset.view === 'timeline') x.classList.add('active'); }); });
    document.getElementById('dashboardUrl').textContent = window.location.origin + (window.location.port ? ' (port ' + window.location.port + ')' : '');
    load('team');
  </script>
</body>
</html>
